<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful | Durian Paradise</title>
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(216, 230, 191, 0.55), transparent 28%),
        radial-gradient(circle at top right, rgba(247, 201, 153, 0.35), transparent 22%),
        radial-gradient(circle at bottom right, rgba(242, 219, 182, 0.45), transparent 26%),
        linear-gradient(180deg, #f6f0e6 0%, #ede3d4 100%);
      color: #111;
      padding: 24px;
    }
    .card {
      width: min(640px, 100%);
      background: rgba(252, 249, 245, 0.92);
      border: 1px solid rgba(170, 156, 138, 0.18);
      border-radius: 24px;
      padding: 34px;
      text-align: center;
      box-shadow: 0 18px 36px rgba(104, 73, 36, 0.08);
    }
    h1 { font-size: clamp(32px, 5vw, 52px); margin-bottom: 14px; }
    p { font-size: 18px; color: #4c4034; margin-bottom: 22px; }
    a {
      display: inline-block;
      background: linear-gradient(135deg, #6f5330 0%, #9d7741 100%);
      color: #fffaf1;
      padding: 14px 24px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Payment Successful</h1>
    <p id="status-message">We’ve received your payment. We’re confirming the order now and will contact you if we need any follow-up details.</p>
    <a href="/">Return to Homepage</a>
  </main>
  <script>
    const statusMessage = document.getElementById("status-message");
    const sessionId = new URLSearchParams(window.location.search).get("session_id") || "";
    const clearPrefixedStorage = () => {
      Object.keys(localStorage).forEach((key) => {
        if (
          key.startsWith("durianParadiseCart")
          || key.startsWith("durianParadisePendingPayment")
        ) {
          localStorage.removeItem(key);
        }
      });
    };

    const sleep = (ms) => new Promise((resolve) => window.setTimeout(resolve, ms));

    (async () => {
      clearPrefixedStorage();

      if (!sessionId) {
        return;
      }

      for (let attempt = 0; attempt < 8; attempt += 1) {
        try {
          const response = await fetch(`/api/checkout-sessions/${encodeURIComponent(sessionId)}/status`);
          const payload = await response.json();

          if (response.ok && payload && payload.paymentStatus === "paid") {
            statusMessage.textContent = "Your payment has been confirmed and your durian order is locked in.";
            return;
          }
        } catch (_error) {
          // Keep the page calm and let the next retry handle it.
        }

        if (attempt < 7) {
          await sleep(1200);
        }
      }

      statusMessage.textContent = "Your payment was accepted. We’re still waiting for final confirmation, so your order panel will stay available until processing finishes.";
    })();
  </script>
</body>
</html>
